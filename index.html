<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Budget Hub</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;padding:20px;background:#111;color:#eee}
canvas{max-width:600px;margin-top:20px}
select{padding:5px;margin:10px 0}
.card{background:#1e1e1e;padding:15px;border-radius:10px;margin:10px 0}
</style>
</head>

<body>

<h1>Budget Dashboard</h1>

<select id="monthSelect"></select>

<div class="card">
  <canvas id="c-pie"></canvas>
</div>

<div class="card">
  <canvas id="c-bar"></canvas>
</div>

<div class="card" id="predictionBox"></div>

<script>

// ================== GLOBAL ==================
let PIE=null, BAR=null;
const CU = "Khasnen"; // current user

// ================== MOCK DB (REPLACED BY YOUR SYNC) ==================
const DB = {
  users:{
    "Khasnen":{
      settings:{
        salary:100000,
        rent:10000,
        tuition:20000,
        gym:2000,
        efund:5000
      }
    }
  },
  entries:[
    {user:"Khasnen",type:"expense",category:"Food",amount:1888,date:"2026-03-31"},
    {user:"Khasnen",type:"expense",category:"Travel",amount:68,date:"2026-03-31"},
    {user:"Khasnen",type:"expense",category:"Misc",amount:2000,date:"2026-03-31"},
    {user:"Khasnen",type:"expense",category:"Food",amount:159,date:"2026-03-31"},
    {user:"Khasnen",type:"expense",category:"Travel",amount:58,date:"2026-04-01"}
  ]
};

// ================== DATE FIX ==================
function parseDate(d){
  return new Date(d + "T00:00:00");
}

// ================== MONTH SELECT ==================
function populateMonthSelector(){
  const sel = document.getElementById("monthSelect");
  sel.innerHTML = "";

  const set = new Set();

  DB.entries.forEach(e=>{
    if(e.user!==CU) return;
    const d = parseDate(e.date);
    set.add(d.getFullYear()+"-"+(d.getMonth()+1));
  });

  [...set].sort().reverse().forEach(m=>{
    const [y,mo]=m.split("-");
    const opt=document.createElement("option");
    opt.value=m;
    opt.textContent=`${y}-${mo}`;
    sel.appendChild(opt);
  });

  sel.onchange=renderAll;
}

// ================== FILTER ==================
function isSelectedMonth(dateStr){
  const sel=document.getElementById("monthSelect").value;
  if(!sel) return true;

  const [y,m]=sel.split("-").map(Number);
  const d=parseDate(dateStr);

  return d.getFullYear()===y && (d.getMonth()+1)===m;
}

// ================== FIXED ==================
function getFixedExpenses(){
  const s=DB.users[CU].settings;
  return [
    {category:"Rent",amount:s.rent||0},
    {category:"Tuition",amount:s.tuition||0},
    {category:"Gym",amount:s.gym||0},
    {category:"Emergency",amount:s.efund||0}
  ];
}

// ================== CATEGORY ==================
function getCategoryData(){
  const data={};

  DB.entries
  .filter(e=>e.user===CU && e.type==="expense" && isSelectedMonth(e.date))
  .forEach(e=>{
    const c=(e.category||"Other").toLowerCase();
    data[c]=(data[c]||0)+e.amount;
  });

  getFixedExpenses().forEach(f=>{
    const c=f.category.toLowerCase();
    data[c]=(data[c]||0)+f.amount;
  });

  return data;
}

// ================== DAILY ==================
function getDailyData(){
  const data={};

  DB.entries
  .filter(e=>e.user===CU && e.type==="expense" && isSelectedMonth(e.date))
  .forEach(e=>{
    const d=parseDate(e.date).getDate();
    data[d]=(data[d]||0)+e.amount;
  });

  return data;
}

// ================== REGRESSION ==================
function getDailySeries(){
  const data=getDailyData();
  const days=Object.keys(data).map(Number).sort((a,b)=>a-b);
  const values=days.map(d=>data[d]);
  return {days,values};
}

function linearRegression(x,y){
  const n=x.length;
  let sx=0,sy=0,sxy=0,sxx=0;

  for(let i=0;i<n;i++){
    sx+=x[i]; sy+=y[i];
    sxy+=x[i]*y[i];
    sxx+=x[i]*x[i];
  }

  const m=(n*sxy-sx*sy)/(n*sxx-sx*sx||1);
  const b=(sy-m*sx)/n;

  return {m,b};
}

function getRegressionLine(labels){
  const {days,values}=getDailySeries();
  if(days.length<2) return labels.map(()=>0);

  const {m,b}=linearRegression(days,values);

  return labels.map(d=>{
    const v=m*d+b;
    return v>0?v:0;
  });
}

// ================== CHART ==================
function renderCharts(){

  const pieData=getCategoryData();
  const barData=getDailyData();

  const pieLabels=Object.keys(pieData);
  const pieValues=Object.values(pieData);

  const barLabels=Object.keys(barData).map(Number).sort((a,b)=>a-b);
  const barValues=barLabels.map(d=>barData[d]);

  const reg=getRegressionLine(barLabels);

  if(PIE) PIE.destroy();
  if(BAR) BAR.destroy();

  if(pieLabels.length){
    PIE=new Chart(c-pie,{
      type:"pie",
      data:{labels:pieLabels,datasets:[{data:pieValues}]}
    });
  }

  BAR=new Chart(c-bar,{
    data:{
      labels:barLabels,
      datasets:[
        {type:"bar",label:"Daily",data:barValues},
        {type:"line",label:"Trend",data:reg,tension:0.3}
      ]
    }
  });
}

// ================== PREDICTIONS ==================
function predictSimple(){
  const data=getDailySeries();
  if(!data.days.length) return 0;

  const sel=document.getElementById("monthSelect").value;
  const [y,m]=sel.split("-").map(Number);

  const today=new Date();
  const daysPassed=today.getDate();
  const totalDays=new Date(y,m,0).getDate();

  const spent=data.values.reduce((a,b)=>a+b,0);

  return (spent/daysPassed)*totalDays;
}

function predictTrend(){
  const {days,values}=getDailySeries();
  if(days.length<2) return 0;

  const {m,b}=linearRegression(days,values);

  const sel=document.getElementById("monthSelect").value;
  const [y,mn]=sel.split("-").map(Number);

  const totalDays=new Date(y,mn,0).getDate();

  let total=0;
  for(let d=1;d<=totalDays;d++){
    const v=m*d+b;
    if(v>0) total+=v;
  }

  return total;
}

function renderPredictions(){
  const box=document.getElementById("predictionBox");

  const simple=predictSimple();
  const trend=predictTrend();

  const s=DB.users[CU].settings;
  const fixed=getFixedExpenses().reduce((a,b)=>a+b.amount,0);

  const total=trend+fixed;

  box.innerHTML=`
    <h3>Predictions</h3>
    <p>Simple: Rs ${simple.toFixed(0)}</p>
    <p><b>Trend: Rs ${trend.toFixed(0)}</b></p>
    <p>Total (with fixed): Rs ${total.toFixed(0)}</p>
    <p style="color:${total>(s.salary||0)?"red":"green"}">
      ${total>(s.salary||0)?"Over Budget":"Within Budget"}
    </p>
  `;
}

// ================== MAIN ==================
function renderAll(){
  renderCharts();
  renderPredictions();
}

populateMonthSelector();
renderAll();

</script>

</body>
</html>
